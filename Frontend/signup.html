<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Student Task Manager</title>
  </head>
<body>
    <div class="container">
      <div class="row justify-content-center mt-5">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="card-title text-center mb-1">Student Task Manager</h2>
              <p class="text-center text-muted mb-4">Create your free account</p>
              <div>
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" id="fullname" class="form-control" placeholder="Enter your full name" autocomplete="off"/>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="text" id="email" class="form-control" placeholder="Enter your email" autocomplete="off"/>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="new-password"/>
                </div>
                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter your password" autocomplete="new-password"/>
                </div>
                <div class="d-grid">
                  <button type="button" id="signup-btn" class="btn btn-primary">Sign Up</button>
                </div>
                <p id="error-msg" class="text-center mt-2"></p>
              </div>
              <p class="text-center mt-3 mb-0">
                Already have an account?
                <a href="index.html">Login</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/signup.js"></script>
  </body>
</html>
