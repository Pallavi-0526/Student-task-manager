<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Profile - Student Task Manager</title>
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">Student Task Manager</a>
        <button class="btn btn-outline-secondary btn-sm" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-6">

          <!-- Profile Info Card -->
          <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
              <h5 class="mb-4">My Profile</h5>

              <div class="mb-3">
                <label class="form-label text-muted">Full Name</label>
                <p id="profile-name" class="fw-bold fs-5"></p>
              </div>

              <div class="mb-3">
                <label class="form-label text-muted">Email</label>
                <p id="profile-email" class="fw-bold fs-5"></p>
              </div>

            </div>
          </div>
          
          <div class="card shadow-sm mb-4">
              <div class="card-body p-4 text-center">
                   <h6 class="mb-3">Profile Picture</h6>
                   <img
                       id="profile-pic-preview"
                       src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                       alt="Profile Picture"
                       class="rounded-circle mb-3"
                       style="width: 120px; height: 120px; object-fit: cover;"
                    />

               <div class="mb-3">
                  <input
                     type="file"
                     id="profile-pic-input"
                     class="form-control"
                     accept="image/*"
                 />
               </div>
               <button class="btn btn-primary" id="upload-pic-btn">Upload Picture</button>
               <p id="pic-msg" class="mt-2 small"></p>
            </div>
          </div>

          <!-- Update Name Card -->
          <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
              <h6 class="mb-3">Update Name</h6>
              <div class="mb-3">
                <input
                  type="text"
                  id="new-name"
                  class="form-control"
                  placeholder="Enter new name"
                  autocomplete="off"
                />
              </div>
              <button class="btn btn-primary" id="update-name-btn">Update Name</button>
              <p id="name-msg" class="mt-2 small"></p>
            </div>
          </div>

          <!-- Change Password Card -->
          <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
              <h6 class="mb-3">Change Password</h6>
              <div class="mb-3">
                <input
                  type="password"
                  id="current-password"
                  class="form-control"
                  placeholder="Current password"
                  autocomplete="new-password"
                />
              </div>
              <div class="mb-3">
                <input
                  type="password"
                  id="new-password"
                  class="form-control"
                  placeholder="New password"
                  autocomplete="new-password"
                />
              </div>
              <div class="mb-3">
                <input
                  type="password"
                  id="confirm-new-password"
                  class="form-control"
                  placeholder="Confirm new password"
                  autocomplete="new-password"
                />
              </div>
              <button class="btn btn-warning" id="change-password-btn">Change Password</button>
              <p id="password-msg" class="mt-2 small"></p>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script src="js/profile.js"></script>
  </body>
</html>
