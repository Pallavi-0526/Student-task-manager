<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Dashboard - Student Task Manager</title>
    <style>
      #pomodoro-float {
        display: none;
        position: fixed;
        top: 60px;
        right: 16px;
        width: 300px;
        z-index: 1050;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        border-radius: 16px;
        background: var(--bg-card, #fff);
      }
    </style>
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Student Task Manager</a>
        <div class="d-flex gap-2 align-items-center">
            <img
                id="nav-avatar"
                src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                class="rounded-circle"
                style="width: 32px; height: 32px; object-fit: cover; cursor: pointer;"
                onclick="window.location.href='profile.html'"
                title="Go to Profile"
            />
            <a href="activity.html" class="dark-mode-toggle" title="Activity Log">📋</a>
            <div style="position:relative;display:inline-block;">
                <button id="reminder-bell" class="dark-mode-toggle" title="Reminders" style="opacity:0.4;">🔔</button>
                <span id="reminder-dot" style="display:none;position:absolute;top:2px;right:2px;width:8px;height:8px;background:#dc3545;border-radius:50%;border:1.5px solid var(--bg-navbar);"></span>
            </div>
            <button class="dark-mode-toggle" id="toggle-pomodoro-btn" title="Pomodoro Timer">🍅</button>
            <button class="dark-mode-toggle" id="theme-toggle">🌙</button>
            <button class="dark-mode-toggle" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {key:'?'}))" title="Keyboard shortcuts">⌨️</button>
            <button class="btn btn-outline-danger btn-sm" id="logout-btn">Logout</button>
        </div>
    </div>
    </nav>

    <!-- Pomodoro Floating Panel -->
    <div id="pomodoro-float" class="card">
      <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0">🍅 Pomodoro Timer</h6>
          <button class="btn-close btn-sm" id="close-pomodoro-btn"></button>
        </div>
        <div class="text-center">
          <div class="d-flex justify-content-center gap-1 mb-2">
            <button class="btn btn-sm btn-outline-danger active" id="pomo-mode-work">Work 25m</button>
            <button class="btn btn-sm btn-outline-success" id="pomo-mode-short">Break 5m</button>
            <button class="btn btn-sm btn-outline-primary" id="pomo-mode-long">Long 15m</button>
          </div>
          <div id="pomo-task-label" class="text-muted small mb-1">No task selected</div>
          <div id="pomo-display" style="font-size:2.8rem; font-weight:700; letter-spacing:4px; font-family:monospace;">25:00</div>
          <div class="progress my-2" style="height:6px;">
            <div class="progress-bar bg-danger" id="pomo-progress" style="width:100%"></div>
          </div>
          <div class="d-flex justify-content-center gap-2 mb-2">
            <button class="btn btn-danger px-3" id="pomo-start-btn">▶ Start</button>
            <button class="btn btn-outline-secondary" id="pomo-reset-btn">↺ Reset</button>
          </div>
          <div class="mb-2">
            <select class="form-select form-select-sm" id="pomo-task-select">
              <option value="">— no task —</option>
            </select>
          </div>
          <span class="badge bg-danger" id="pomo-session-count">0 sessions today</span>
        </div>
      </div>
    </div>

    <div class="container mt-4">

      <!-- Welcome -->
      <h4 class="mb-4" id="welcome-msg">Hey! Welcome back, Learner 👋</h4>

      <!-- Projects section -->
      <h5 class="mb-3">My Projects</h5>
      <div id="project-summary" class="row g-2 mb-3">
          <div class="col-6 col-md-3">
              <div class="card text-center py-2 border-0" style="background:var(--stat-total)">
                  <div class="fw-bold fs-4" id="pstat-total">0</div>
                  <div class="small text-muted">Total</div>
              </div>
          </div>
          <div class="col-6 col-md-3">
              <div class="card text-center py-2 border-0" style="background:var(--stat-pending)">
                  <div class="fw-bold fs-4 text-warning" id="pstat-pending">0</div>
                  <div class="small text-muted">Pending</div>
              </div>
          </div>
          <div class="col-6 col-md-3">
              <div class="card text-center py-2 border-0" style="background:var(--stat-completed)">
                  <div class="fw-bold fs-4 text-success" id="pstat-completed">0</div>
                  <div class="small text-muted">Completed</div>
              </div>
          </div>
          <div class="col-6 col-md-3">
              <div class="card text-center py-2 border-0" style="background:var(--stat-overdue)">
                  <div class="fw-bold fs-4 text-danger" id="pstat-overdue">0</div>
                  <div class="small text-muted">Overdue</div>
              </div>
          </div>
      </div>
      <div class="mb-3">
          <input type="text" id="project-search" class="form-control" placeholder="🔍 Search projects..." oninput="searchProjects(this.value)"/>
      </div>
      <div class="d-flex gap-2 mb-3 flex-wrap">
          <button class="btn btn-sm btn-outline-secondary active" id="pfilter-all" onclick="filterProjects('all')">All</button>
          <button class="btn btn-sm btn-outline-warning" id="pfilter-pending" onclick="filterProjects('pending')">Pending</button>
          <button class="btn btn-sm btn-outline-success" id="pfilter-completed" onclick="filterProjects('completed')">Completed</button>
          <button class="btn btn-sm btn-outline-danger" id="pfilter-overdue" onclick="filterProjects('overdue')">Overdue</button>
          <button class="btn btn-sm btn-outline-secondary ms-auto" id="export-projects-btn">⬇ Export CSV</button>
      </div>
      <div id="project-list"></div>

      <!-- Add New Project -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h6 class="mb-3">Add New Project</h6>
          <div class="row g-2">
            <div class="col-md-4">
                <input type="text" id="project-input" class="form-control" placeholder="Enter project name..."/>
            </div>
            <div class="col-md-3">
                <input type="date" id="project-deadline" class="form-control"/>
            </div>
            <div class="col-md-3">
                <button id="add-project-btn" class="btn btn-primary w-100">Add</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Tasks section -->
      <h5 class="mb-3 mt-4">My Tasks</h5>
      <div id="task-summary" class="row g-2 mb-3">
          <div class="col-6 col-md-3">
              <div class="card text-center py-2 border-0" style="background:var(--stat-total)">
                  <div class="fw-bold fs-4" id="tstat-total">0</div>
                  <div class="small text-muted">Total</div>
              </div>
          </div>
          <div class="col-6 col-md-3">
              <div class="card text-center py-2 border-0" style="background:var(--stat-pending)">
                  <div class="fw-bold fs-4 text-warning" id="tstat-pending">0</div>
                  <div class="small text-muted">Pending</div>
              </div>
          </div>
          <div class="col-6 col-md-3">
              <div class="card text-center py-2 border-0" style="background:var(--stat-completed)">
                  <div class="fw-bold fs-4 text-success" id="tstat-completed">0</div>
                  <div class="small text-muted">Completed</div>
              </div>
          </div>
          <div class="col-6 col-md-3">
              <div class="card text-center py-2 border-0" style="background:var(--stat-overdue)">
                  <div class="fw-bold fs-4 text-danger" id="tstat-overdue">0</div>
                  <div class="small text-muted">Overdue</div>
              </div>
          </div>
      </div>
      <div class="mb-3">
          <input type="text" id="task-search" class="form-control" placeholder="🔍 Search tasks..." oninput="searchTasks(this.value)"/>
      </div>
      <div class="d-flex gap-2 mb-3 flex-wrap">
          <button class="btn btn-sm btn-outline-secondary active" id="filter-all" onclick="filterTasks('all')">All</button>
          <button class="btn btn-sm btn-outline-warning" id="filter-pending" onclick="filterTasks('pending')">Pending</button>
          <button class="btn btn-sm btn-outline-success" id="filter-completed" onclick="filterTasks('completed')">Completed</button>
          <button class="btn btn-sm btn-outline-danger" id="filter-overdue" onclick="filterTasks('overdue')">Overdue</button>
          <button class="btn btn-sm btn-outline-secondary ms-auto" id="export-tasks-btn">⬇ Export CSV</button>
      </div>
      <div id="task-list"></div>

      <!-- Add New Task -->
      <div class="card shadow-sm mb-3">
          <div class="card-body">
              <h6 class="mb-3">Add New Task</h6>
              <div class="row g-2">
                  <div class="col-md-3">
                      <input type="text" id="task-title" class="form-control" placeholder="Enter task name..." autocomplete="off"/>
                  </div>
                  <div class="col-md-2">
                      <input type="date" id="task-deadline" class="form-control"/>
                  </div>
                  <div class="col-md-3">
                      <select id="task-project-select" class="form-select">
                          <option value="">No project</option>
                      </select>
                  </div>
                  <div class="col-md-2">
                      <button class="btn btn-primary w-100" id="add-task-btn">Add</button>
                  </div>
              </div>
          </div>
      </div>
    </div>
    <script src="js/dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  </body>
</html>
