<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css" />
    <title>Activity Log - Student Task Manager</title>
  </head>
  <body>
    <nav class="navbar bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">← Student Task Manager</a>
      </div>
    </nav>

    <div class="container mt-4" style="max-width:680px;">
      <h4 class="mb-1">Activity Log</h4>
      <p class="text-muted small mb-4">Your last 50 actions</p>

      <div id="activity-list">
        <div class="text-center text-muted py-5">Loading...</div>
      </div>
    </div>

    <script>
      const BASE_URL = "http://127.0.0.1:8000";
      const token = localStorage.getItem("token");
      if (!token) { window.location.replace("./index.html"); }

      const ICONS = {
        task_created:      { icon: "➕", color: "#0d6efd" },
        task_completed:    { icon: "✅", color: "#198754" },
        task_updated:      { icon: "✏️", color: "#6c757d" },
        task_deleted:      { icon: "🗑️", color: "#dc3545" },
        project_created:   { icon: "📁", color: "#0d6efd" },
        project_completed: { icon: "🏆", color: "#198754" },
        project_updated:   { icon: "✏️", color: "#6c757d" },
        project_deleted:   { icon: "🗑️", color: "#dc3545" },
      };

      function formatTime(isoStr) {
        const d = new Date(isoStr);
        return d.toLocaleString();
      }

      async function loadActivity() {
        const res = await fetch(`${BASE_URL}/activity`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        const list = document.getElementById("activity-list");
        if (!res.ok) { list.innerHTML = '<p class="text-danger">Failed to load activity.</p>'; return; }
        const logs = await res.json();
        if (logs.length === 0) {
          list.innerHTML = '<p class="text-muted text-center py-5">No activity yet — start adding tasks and projects!</p>';
          return;
        }
        list.innerHTML = "";
        logs.forEach(function(log) {
          const meta = ICONS[log.action] || { icon: "📌", color: "#6c757d" };
          const item = document.createElement("div");
          item.className = "d-flex gap-3 mb-3 align-items-start";
          item.innerHTML = `
            <div style="width:36px;height:36px;border-radius:50%;background:${meta.color}20;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;">
              ${meta.icon}
            </div>
            <div class="card flex-grow-1 shadow-sm border-0">
              <div class="card-body py-2 px-3">
                <div style="font-size:14px;">${log.description}</div>
                <div class="text-muted" style="font-size:11px;">${formatTime(log.timestamp)}</div>
              </div>
            </div>
          `;
          list.appendChild(item);
        });
      }

      loadActivity();
    </script>
  </body>
</html>
